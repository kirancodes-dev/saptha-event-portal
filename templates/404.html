<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══ SEO Meta Tags ═══ -->
<meta name="description" content="Page not found on SapthaEvent. The page you're looking for doesn't exist. Return to the home page or contact support.">
<meta name="robots" content="noindex, follow">
<!-- ═══ Canonical ═══ -->
<link rel="canonical" href="https://events.snpsu.edu.in">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<title>404 - Page Not Found | SapthaEvent</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--blue:#0d2d62;--orange:#f37021;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;border:1px solid #e2e8f0;padding:48px 36px;max-width:480px;width:100%;text-align:center;}
.logo-sq{width:56px;height:56px;background:var(--orange);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;color:#fff;margin:0 auto 20px;}
.code{font-family:'Poppins',sans-serif;font-size:72px;font-weight:800;color:var(--blue);line-height:1;margin-bottom:8px;}
.title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:#1e293b;margin-bottom:8px;}
.desc{font-size:14px;color:#64748b;line-height:1.65;margin-bottom:28px;}
.divider{border:none;border-top:1px solid #e2e8f0;margin:24px 0;}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:var(--orange);color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px;text-decoration:none;transition:.15s;margin:4px;}
.btn-home:hover{background:#d95f0f;color:#fff;}
.btn-back{display:inline-flex;align-items:center;gap:8px;background:#f1f5f9;color:#334155;font-size:14px;font-weight:500;padding:12px 24px;border-radius:10px;text-decoration:none;transition:.15s;margin:4px;border:1px solid #e2e8f0;}
.btn-back:hover{background:#e2e8f0;color:#1e293b;}
.uni{font-size:11.5px;color:#94a3b8;margin-top:20px;}
/* ── ACCESSIBILITY ────────────────────── */
*:focus-visible{outline:3px solid var(--orange);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
@media(prefers-contrast:more){.title,.code{font-weight:900;}.btn-home,.btn-back{border:2px solid;font-weight:700;}}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;}.card{background:#2a2a2a;color:#e0e0e0;border-color:#444;}.title{color:#e0e0e0;}.desc{color:#a0a0a0;}.btn-back{background:#333;color:#e0e0e0;border-color:#555;}.btn-back:hover{background:#444;}}
</style>
</head>
<body role="main" aria-label="404 Page Not Found">
<div class="card" role="region" aria-live="polite" aria-label="Error message">
  <div class="logo-sq" style="background:var(--orange);" aria-hidden="true"><img src="https://snpsu.edu.in/wp-content/uploads/2024/03/Untitled-2-1-1536x527.png" alt="" style="height:24px;width:auto;filter:brightness(0)invert(1);" onerror="this.style.display='none';"></div>
  <div class="code" aria-label="Error code">404</div>
  <h1 class="title">Page Not Found</h1>
  <p class="desc">
    The page you're looking for doesn't exist or may have been moved.<br>
    Check the URL or head back to the portal homepage.
  </p>
  <div>
    <a href="/" class="btn-home"><i class="fas fa-home" style="font-family:'Font Awesome 6 Free';font-weight:900;"></i> Go to Homepage</a>
    <a href="javascript:history.back()" class="btn-back">← Go Back</a>
  </div>
  <div class="divider"></div>
  <div style="text-align:center;margin-bottom:8px;">
    <img src="https://snpsu.edu.in/wp-content/uploads/2024/03/Untitled-2-1-1536x527.png"
         alt="Sapthagiri NPS University"
         style="height:24px;width:auto;object-fit:contain;filter:brightness(0)invert(1);"
         onerror="this.style.display='none'">
  </div>
  <p class="uni">Sapthagiri NPS University, Bengaluru</p>
</div>
</body>
</html>
