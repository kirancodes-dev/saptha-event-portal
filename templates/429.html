<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Many Requests | SapthaEvent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(to right, #f59e0b, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #94a3b8;
        }
        .btn-home {
            background: #f59e0b;
            color: #0f172a;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-home:hover {
            background: #d97706;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }
        .countdown {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">429</div>
        <h2 class="mb-3">Slow Down!</h2>
        <p class="error-message">You've made too many requests in a short time.</p>
        <p class="countdown">Please wait a moment before trying again.</p>
        <a href="/" class="btn-home"><i class="fas fa-home me-2"></i>Return Home</a>
    </div>
</body>
</html>
