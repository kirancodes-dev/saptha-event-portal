<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══ SEO Meta Tags ═══ -->
<meta name="description" content="Rate limit exceeded on SapthaEvent. Too many requests detected. Please wait a moment and try again.">
<meta name="robots" content="noindex, nofollow">
<!-- ═══ Canonical ═══ -->
<link rel="canonical" href="https://events.snpsu.edu.in">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<title>429 - Too Many Requests | SapthaEvent</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--blue:#0d2d62;--orange:#f37021;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;border:1px solid #e2e8f0;padding:48px 36px;max-width:480px;width:100%;text-align:center;}
.logo-sq{width:56px;height:56px;background:var(--orange);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;color:#fff;margin:0 auto 20px;}
.code{font-family:'Poppins',sans-serif;font-size:72px;font-weight:800;color:#f59e0b;line-height:1;margin-bottom:8px;}
.title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:#1e293b;margin-bottom:8px;}
.desc{font-size:14px;color:#64748b;line-height:1.65;margin-bottom:28px;}
.countdown-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:16px;margin-bottom:24px;}
.countdown-n{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;color:#b45309;}
.countdown-l{font-size:13px;color:#78350f;}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px;text-decoration:none;transition:.15s;}
.btn-home:hover{background:#0a2352;color:#fff;}
.uni{font-size:11.5px;color:#94a3b8;margin-top:20px;}
/* ── ACCESSIBILITY ────────── */
*:focus-visible{outline:3px solid var(--orange);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
@media(prefers-contrast:more){.title,.code{font-weight:900;}.btn-home{border:2px solid;font-weight:700;}}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;}.card{background:#2a2a2a;color:#e0e0e0;border-color:#444;}.title{color:#e0e0e0;}.desc{color:#a0a0a0;}.countdown-box{background:#2d1f00;border-color:#665200;color:#ddd;}}
</style>
</head>
<body role="main" aria-label="429 Rate Limit Error">
<div class="card" role="region" aria-live="polite" aria-label="Rate limit error message">
  <div class="logo-sq" style="background:var(--orange);" aria-hidden="true"><img src="https://snpsu.edu.in/wp-content/uploads/2024/03/Untitled-2-1-1536x527.png" alt="" style="height:24px;width:auto;filter:brightness(0)invert(1);" onerror="this.style.display='none';"></div>
  <div class="code" aria-label="Error code">429</div>
  <h1 class="title">Slow Down!</h1>
  <p class="desc">You've made too many requests in a short time. Please wait a moment before trying again.</p>
  <div class="countdown-box">
    <div class="countdown-n" id="timer">60</div>
    <div class="countdown-l">seconds until you can try again</div>
  </div>
  <a href="/" class="btn-home">↩ Return Home</a>
  <div style="text-align:center;margin-bottom:8px;">
    <img src="https://snpsu.edu.in/wp-content/uploads/2024/03/Untitled-2-1-1536x527.png"
         alt="Sapthagiri NPS University"
         style="height:24px;width:auto;object-fit:contain;filter:brightness(0)invert(1);"
         onerror="this.style.display='none'">
  </div>
  <p class="uni">Sapthagiri NPS University, Bengaluru</p>
</div>
<script>
let t = 60;
const el = document.getElementById('timer');
const iv = setInterval(() => {
  t--;
  el.textContent = t;
  if (t <= 0) { clearInterval(iv); window.location.href = '/'; }
}, 1000);
</script>
</body>
</html>
