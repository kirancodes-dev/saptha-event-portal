<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="10">
    <title>Live Leaderboard | SapthaEvent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root{--blue:#0d2d62;--orange:#f37021;}
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            overflow: hidden; /* Hide scrollbars for projector */
            background-image: radial-gradient(circle at 50% 50%, #1a2a3f 0%, #000000 100%);
        }
        
        /* Neon Header */
        .header-title {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(243, 112, 33, 0.8);
            margin-bottom: 10px;
        }

        /* Leaderboard Table */
        .rank-card {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        /* Top 3 Highlighting */
        .rank-1 { background: linear-gradient(90deg, rgba(243, 112, 33, 0.2), transparent); border-color: var(--orange); transform: scale(1.02); }
        .rank-2 { background: linear-gradient(90deg, rgba(148, 163, 184, 0.2), transparent); border-color: #94a3b8; }
        .rank-3 { background: linear-gradient(90deg, rgba(13, 45, 98, 0.2), transparent); border-color: var(--blue); }

        .rank-num { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; width: 60px; font-weight: bold; }
        .team-info { flex-grow: 1; padding-left: 20px; }
        .team-name { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .lead-name { color: #94a3b8; font-size: 1.1rem; }
        
        .score-display { text-align: right; }
        .score-val { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: bold; color: var(--orange); }
        .judge-count { font-size: 0.9rem; color: #64748b; }

        /* Crown Icons */
        .fa-crown { color: var(--orange); margin-right: 10px; }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="header-title display-4 fw-bold">🏆 Live Leaderboard</h1>
            <h3 class="text-secondary">{{ event_title }}</h3>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                {% for team in teams %}
                <div class="rank-card rank-{{ loop.index }}">
                    <div class="d-flex align-items-center">
                        <div class="rank-num">
                            {% if loop.index == 1 %}<i class="fas fa-crown"></i>{% else %}#{{ loop.index }}{% endif %}
                        </div>
                        <div class="team-info">
                            <h2 class="team-name">{{ team.team }}</h2>
                            <span class="lead-name">{{ team.lead }}</span>
                        </div>
                    </div>
                    
                    <div class="score-display">
                        <div class="score-val">{{ team.score }}</div>
                        <span class="judge-count">{{ team.judges }} Judge(s)</span>
                    </div>
                </div>
                {% else %}
                <div class="text-center text-muted py-5">
                    <h2>Waiting for scores... ⏳</h2>
                </div>
                {% endfor %}

            </div>
        </div>
    </div>

</body>
</html>
