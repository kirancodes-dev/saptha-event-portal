<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Portal | Sapthagiri NPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .navbar { background-color: #0d2d62; padding: 15px; }
        .event-card { background: white; border-radius: 12px; border-left: 6px solid #f37021; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .event-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(13, 45, 98, 0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-balance-scale me-2" style="color: #f37021;"></i> Judge Portal</a>
            <div class="text-white d-flex align-items-center gap-3">
                <span class="d-none d-md-block">Welcome, {{ user_name }}</span>
                <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 800px;">
        <h4 class="fw-bold mb-4" style="color: #0d2d62;">Events Assigned to You</h4>
        
        <div class="row g-4">
            {% for event in events %}
            <div class="col-12">
                <div class="event-card p-4 d-flex flex-column flex-md-row justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold m-0" style="color: #0d2d62;">{{ event.title }}</h4>
                        <p class="text-muted small mt-1 mb-0"><i class="fas fa-map-marker-alt me-1"></i> {{ event.venue }} | <i class="fas fa-calendar me-1 ms-2"></i> {{ event.date }}</p>
                    </div>
                    <a href="/judge/event/{{ event.id }}" class="btn btn-lg text-white fw-bold mt-3 mt-md-0 px-4" style="background-color: #f37021;">
                        Start Evaluating <i class="fas fa-arrow-right ms-2"></i>
                    </a>
                </div>
            </div>
            {% else %}
            <div class="text-center text-muted py-5"><i class="fas fa-folder-open fa-3x mb-3 opacity-50"></i><h5>You have not been assigned to any active events.</h5></div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
