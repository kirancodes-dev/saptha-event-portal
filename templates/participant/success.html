<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; }
        .success-card { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 50px; text-align: center; max-width: 500px; border-top: 8px solid #10b981; }
        .check-icon { font-size: 5rem; color: #10b981; margin-bottom: 20px; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .btn-snpsu { background-color: #0d2d62; color: white; font-weight: bold; border-radius: 8px; padding: 12px 30px; transition: 0.3s; }
        .btn-snpsu:hover { background-color: #0a224a; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="success-card">
        <i class="fas fa-check-circle check-icon"></i>
        <h2 class="fw-bold mb-3" style="color: #0d2d62; font-family: 'Poppins', sans-serif;">Registration Confirmed!</h2>
        <p class="text-muted mb-4 fs-5">You are successfully registered for <br><strong style="color: #f37021;">{{ event_title }}</strong>.</p>
        <div class="alert alert-info border-0 bg-light text-dark fw-medium mb-4">
            <i class="fas fa-envelope-open-text me-2 text-primary"></i> We have emailed your Ticket and Login Password to your registered email address.
        </div>
        <a href="/login" class="btn btn-snpsu w-100 fs-5">Login to View Ticket <i class="fas fa-arrow-right ms-2"></i></a>
    </div>

</body>
</html>
