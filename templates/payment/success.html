<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Success | SapthaEvent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .success-card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #334155; max-width: 500px; width: 100%; }
        .check-icon { width: 80px; height: 80px; background: #10b981; color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon"><i class="fas fa-check"></i></div>
        <h2 class="fw-bold mb-2">Payment Successful!</h2>
        <p class="text-muted mb-4">You are registered for <strong>{{ title }}</strong></p>
        
        <div class="bg-black p-3 rounded mb-4 text-start">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Transaction ID</span>
                <span class="text-white fw-mono">{{ reg_id }}</span>
            </div>
            <div class="d-flex justify-content-between">
                <span class="text-muted">Amount Paid</span>
                <span class="text-success fw-bold">₹{{ amount }}</span>
            </div>
        </div>

        <p class="small text-muted mb-4">A confirmation email with your Ticket QR Code has been sent.</p>
        
        <a href="/participant/dashboard" class="btn btn-primary w-100 fw-bold">Go to Dashboard</a>
    </div>
</body>
</html>
