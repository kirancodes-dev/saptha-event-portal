<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment | SapthaEvent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .payment-card { background: white; width: 100%; max-width: 450px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: #0f172a; color: white; padding: 25px; text-align: center; }
        .amount { font-size: 2.5rem; font-weight: 800; color: #3b82f6; }
        .card-body { padding: 30px; }
        .payment-method { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
        .payment-method:hover, .payment-method.active { border-color: #3b82f6; background: #eff6ff; }
        .btn-pay { background: #10b981; color: white; width: 100%; padding: 15px; font-weight: 700; border-radius: 8px; border: none; font-size: 1.1rem; margin-top: 10px; }
        .btn-pay:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="payment-card">
        <div class="card-header">
            <h5 class="mb-0 text-muted small text-uppercase">Payment Amount</h5>
            <div class="amount">₹{{ amount }}</div>
            <div class="small mt-2 opacity-75">for {{ event.title }}</div>
        </div>
        <div class="card-body">
            <p class="text-muted small mb-3 fw-bold">SELECT PAYMENT METHOD</p>
            
            <div class="payment-method active" onclick="selectMethod(this)">
                <i class="fab fa-google-pay text-dark fs-3"></i>
                <div>
                    <div class="fw-bold text-dark">UPI / GPay</div>
                    <div class="small text-muted">Instant payment</div>
                </div>
            </div>
            
            <div class="payment-method" onclick="selectMethod(this)">
                <i class="fas fa-credit-card text-primary fs-3"></i>
                <div>
                    <div class="fw-bold text-dark">Card</div>
                    <div class="small text-muted">Visa, MasterCard</div>
                </div>
            </div>

            <form action="/payment/process/{{ event_id }}" method="POST" id="payForm">
                <input type="hidden" name="amount" value="{{ amount }}">
                <button type="button" class="btn-pay" onclick="processPayment()">
                    Pay Securely <i class="fas fa-lock ms-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none text-muted small">Cancel Transaction</a>
            </div>
        </div>
    </div>

    <script>
        function selectMethod(el) {
            document.querySelectorAll('.payment-method').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
        }

        function processPayment() {
            const btn = document.querySelector('.btn-pay');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;
            
            // Simulate delay for realism
            setTimeout(() => {
                document.getElementById('payForm').submit();
            }, 1500);
        }
    </script>
</body>
</html>
