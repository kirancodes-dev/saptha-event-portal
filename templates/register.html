<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | SapthaEvent</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --snpsu-blue: #0d2d62; --snpsu-orange: #f37021; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(13, 45, 98, 0.85), rgba(13, 45, 98, 0.95)), 
                        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop') center/cover fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0;
        }
        .register-card { background: #ffffff; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 100%; max-width: 550px; padding: 40px; position: relative; }
        .register-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--snpsu-orange); }
        .logo-title { font-family: 'Poppins', sans-serif; color: var(--snpsu-blue); font-weight: 800; font-size: 1.4rem; letter-spacing: 0.5px; }
        .form-label { font-size: 0.8rem; font-weight: 700; color: var(--snpsu-blue); text-transform: uppercase; margin-bottom: 6px; }
        .form-control { background-color: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px 15px; }
        .form-control:focus { background-color: #fff; border-color: var(--snpsu-blue); box-shadow: 0 0 0 4px rgba(13, 45, 98, 0.1); }
        .btn-register { background-color: var(--snpsu-orange); color: white; font-weight: 700; padding: 12px; border-radius: 8px; transition: 0.3s; border: none;}
        .btn-register:hover { background-color: #d95e1a; transform: translateY(-2px); color: white;}
    </style>
</head>
<body>

    <div class="container px-3 d-flex justify-content-center">
        <div class="register-card">
            
            <div class="text-center mb-4 pb-3 border-bottom">
                <i class="fas fa-university mb-2" style="font-size: 2rem; color: var(--snpsu-orange);"></i>
                <div class="logo-title m-0">SAPTHAGIRI <span style="color: var(--snpsu-orange);">NPS</span></div>
                <small style="letter-spacing: 2px; font-weight: 600; color: #64748b; font-size: 0.7rem;">STUDENT REGISTRATION</small>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }} small fw-bold py-2">{{ message }}</div>{% endfor %}{% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <div class="row g-3 mb-3">
                    <div class="col-12 col-md-6"><label class="form-label">Full Name</label><input type="text" name="name" class="form-control" required></div>
                    <div class="col-12 col-md-6"><label class="form-label">USN / ID</label><input type="text" name="usn" class="form-control" required></div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-12 col-md-6"><label class="form-label">Email Address</label><input type="email" name="email" class="form-control" required></div>
                    <div class="col-12 col-md-6"><label class="form-label">Phone Number</label><input type="tel" name="phone" class="form-control" required></div>
                </div>
                <div class="mb-4"><label class="form-label">Create Password</label><input type="password" name="password" class="form-control" required minlength="6"></div>

                <button type="submit" class="btn btn-register w-100 mb-3">Create Account</button>

                <div class="text-center mt-3 small text-muted">
                    Already have an account? <a href="/login" style="color: var(--snpsu-blue); font-weight: bold; text-decoration: none;">Login Here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
